# Системный nginx: домен nornickel.indata.group → web-контейнер (127.0.0.1:8012).
# Кладётся в /etc/nginx/sites-available/nornickel и линкуется в sites-enabled.
# TLS (443) добавит certbot: sudo certbot --nginx -d nornickel.indata.group
server {
    server_name nornickel.indata.group;
    client_max_body_size 200m;

    location / {
        proxy_pass http://127.0.0.1:8012;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    listen 80;
    listen [::]:80;
}
