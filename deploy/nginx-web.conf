# nginx внутри контейнера web: статика SPA + прокси /api на backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # крупные PDF в базу знаний (скан Лодейщикова ~160 МБ)
    client_max_body_size 200m;

    # API → бэкенд (имя сервиса в compose-сети)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;   # живая генерация гипотез может идти минуты
        proxy_send_timeout 900s;
    }

    # статика с длинным кэшем
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-фолбэк
    location / {
        try_files $uri /index.html;
    }
}
