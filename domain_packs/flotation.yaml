     positions: ["№6", "№201А"], count: 3}

# тип гипотезы -> требуемое оборудование (для проверки present_on_plant)
type_to_equipment:
  regrind: ["МШР 3,2×3,8", "МШЦ 4,5×6,0"]
  liner: ["МШЦ 4,5×6,0", "МШРГУ 4,5×6,0", "МШР 3,2×3,8"]
  classification: ["ГЦ-660", "1КСП24", "2КСН24"]
  screening: ["Sibra 2DR"]
  flotation_time: ["ФПМ-16-4К", "ФМ-16УМ-4К"]
  reagent: ["ФПМ-16-4К"]
  density: ["ФПМ-16-4К"]
  crushing: ["КРД 700/75", "КМД-2200Т"]
  magnetic: []          # магнитных сепараторов в списке нет -> present_on_plant=false, capex=high
  contact_tank: []      # контактных чанов в списке нет
  gravity: []
  automation: []
  other: []

process_areas: ["дробление", "измельчение", "классификация", "флотация", "реагентика", "вспомогательные"]

# ============================================================================
# ОЦИФРОВАННЫЕ СХЕМЫ ФАБРИК (одноразовая vision-оцифровка изображений кейса
# data/case/Схемы флотации + Регламенты; каждая цифра перепроверена вторым
# независимым проходом по картинке — см. eval/flowsheet_digitization.md).
# Правило честности: нечитаемое/отсутствующее = null, не угадано.
# ============================================================================
flowsheets:
  # КГМК: граф НЕ оцифрован — только исходные изображения (Схема 1 — дробильное
  # отделение, карьер+шахта -> ИФЦ; Схема 2 — цепь аппаратов измельчительно-
  # флотационного цеха). nodes/streams пустые: диагнозы идут без привязки к
  # переделам, UI показывает исходные схемы вместо графа.
  "КГМК":
    source_files: ["Схема 1.png", "Схема 2.png"]
    nodes: []
    streams: []
  "НОФ":
    source_files: ["Регламент 1.png", "Схема 4.png", "Схема 5.png", "Схема 6.png"]
    nodes:
      # --- дробление (Схема 4.png; руды «Октябрьский»/«Комсомольский») ---
      - {id: nof_crushing_1, name: "Дробление 1 ст. (КРД 700/75)", type: crushing,
         t_min: null, pct_solids: 95.4, reagents: null, equipment_positions: ["КРД 700/75 №4"]}
      - {id: nof_screening_crush, name: "Грохочение (Sibra 2DR, 2 шт)", type: classification,
         t_min: null, pct_solids: 95.4, reagents: null, equipment_positions: ["Sibra 2DR №1", "Sibra 2DR №2"]}
      - {id: nof_crushing_3, name: "Дробление 3 ст. (КМД 2200Т, 2 шт)", type: crushing,
         t_min: null, pct_solids: 95.9, reagents: null, equipment_positions: ["КМД-2200Т №1", "КМД-2200Т №2"]}
      # --- измельчение/классификация (Схема 5.png; агрегировано по стадиям) ---
      - {id: nof_grinding_2, name: "Измельчение II стадии (МШЦ 4,5×6,0 + ГЦ-660)", type: grinding,
         t_min: null, pct_solids: null, reagents: null, equipment_positions: ["4-2", "5-3", "5-5"]}
      - {id: nof_classification_gc, name: "Классификация в гидроциклонах ГЦ-660", type: classification,
         t_min: null, pct_solids: null, reagents: null, equipment_positions: ["4-2-ГЦ-660", "5-3-ГЦ-660", "5-5-ГЦ-660"]}
      - {id: nof_grinding_1, name: "Измельчение I стадии (МШРГУ/МШР со спиральными классификаторами)", type: grinding,
         t_min: null, pct_solids: null, reagents: null,
         equipment_positions: ["4-3", "4-5", "4-11", "5-1", "5-2", "5-4"]}
      - {id: nof_classification_sp, name: "Классификация в спиральных классификаторах (1КСП24/2КСН24)", type: classification,
         t_min: null, pct_solids: null, reagents: null,
         equipment_positions: ["4-3-CF", "4-5.11-CF", "5-1.2-CF", "5-4-CF"]}
      # --- флотация (Регламент 1.png: карта режимов + металлобаланс, 108/108 цифр
      #     подтверждено верификацией; питание 60,6% -0,071 мм, уд.вес шихты 2,88) ---
      - {id: nof_coll_flot_1, name: "1 основная коллективная флотация", type: flotation,
         t_min: "28-32", pct_solids: 32,
         reagents: {"ПДН-11": 350, "Ксантогенат Кбут": 130, "Аэрофлот": 15, "Вспениватель Т92": 15},
         equipment_positions: null}
      - {id: nof_coll_flot_2, name: "2 основная коллективная флотация", type: flotation,
         t_min: "28-32", pct_solids: 32.1,
         reagents: {"Ксантогенат Кбут": 30, "Аэрофлот": 10, "Вспениватель Т92": 10},
         equipment_positions: null}
      - {id: nof_class_conc, name: "Классификация коллективного концентрата", type: classification,
         t_min: null, pct_solids: 42, reagents: null, equipment_positions: null}
      - {id: nof_regrind_conc, name: "Доизмельчение коллективного концентрата", type: grinding,
         t_min: null, pct_solids: 51, reagents: null, equipment_positions: null}
      - {id: nof_class_tails, name: "Классификация хвостов", type: classification,
         t_min: null, pct_solids: 32, reagents: null, equipment_positions: null}
      - {id: nof_gravity, name: "Гравитационное обогащение", type: gravity,
         t_min: null, pct_solids: 42.8, reagents: null, equipment_positions: null}
      - {id: nof_cleaner_1, name: "1 перечистная флотация", type: flotation,
         t_min: "48-52", pct_solids: 37.8, reagents: {"ПДН-11": 60}, equipment_positions: null}
      - {id: nof_main_flot_1, name: "1 основная флотация (разделение)", type: flotation,
         t_min: "18-22", pct_solids: 34.6, reagents: {"Аэрофлот": 2}, equipment_positions: null}
      - {id: nof_regrind_ni, name: "Доизмельчение Cu-концентрата", type: grinding,
         t_min: null, pct_solids: 38, reagents: null, equipment_positions: null}
      - {id: nof_steaming, name: "Пропарка", type: flotation,
         t_min: 10, pct_solids: 38, reagents: null, equipment_positions: null}
      - {id: nof_main_flot_2, name: "2 основная флотация", type: flotation,
         t_min: "18-22", pct_solids: 37, reagents: null, equipment_positions: null}
      - {id: nof_main_flot_3, name: "3 основная флотация", type: flotation,
         t_min: "16-20", pct_solids: 31.3, reagents: {"Аэрофлот": 4}, equipment_positions: null}
      - {id: nof_cu_cleaner_1, name: "Перечистка первая медная", type: flotation,
         t_min: "13-17", pct_solids: 31.7, reagents: null, equipment_positions: null}
      - {id: nof_cu_cleaner_2, name: "Перечистка вторая медная", type: flotation,
         t_min: "8-12", pct_solids: 38, reagents: null, equipment_positions: null}
      # --- Cu-цикл, аппаратная схема (Схема 6.png: только позиции, чисел на схеме нет) ---
      - {id: nof_cu_aeration, name: "Аэрация (Cu-цикл, секция 4)", type: flotation,
         t_min: null, pct_solids: null, reagents: null,
         equipment_positions: ["4-16", "4-17", "4-18", "4-19", "4-20"]}
      - {id: nof_thickening_cu, name: "Сгущение Cu-концентрата (П-30/П-50)", type: thickening,
         t_min: null, pct_solids: null, reagents: null,
         equipment_positions: ["4-СТ-01…06", "4-СТ-07"]}
    streams:
      # металлобаланс Регламента 1.png (кр.N = номер потока на схеме)
      - {from: вход, to: nof_coll_flot_1, kind: feed, name: "Питание флотации (кр.1)",
         gamma: 99.82, beta_cu: 0.459, beta_ni: 0.307, eps_cu: 99.6, eps_ni: 99.0}
      - {from: nof_coll_flot_1, to: nof_class_conc, kind: concentrate,
         name: "Конц-т 1 осн. коллективной (кр.3)",
         gamma: 7.78, beta_cu: 5.52, beta_ni: 3.09, eps_cu: 93.4, eps_ni: 77.6}
