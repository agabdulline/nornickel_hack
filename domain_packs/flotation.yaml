  - {name: "П-50", type: "сгуститель", positions: []}

# тип гипотезы -> требуемое оборудование (для проверки present_on_plant)
type_to_equipment:
  regrind: ["МШР 3,2×3,8", "МШЦ 4,5×6,0"]
  liner: ["МШЦ 4,5×6,0", "МШРГУ 4,5×6,0", "МШР 3,2×3,8"]
  classification: ["ГЦ-660", "1КСП24", "2КСН24"]
  screening: ["Sibra 2DR"]
  flotation_time: ["ФПМ-16-4К", "ФМ-16УМ-4К"]
  reagent: ["ФПМ-16-4К"]
  density: ["ФПМ-16-4К"]
  crushing: ["КРД 700/75", "КМД-2200Т"]
  magnetic: []          # магнитных сепараторов в списке нет -> present_on_plant=false, capex=high
  contact_tank: []      # контактных чанов в списке нет
  gravity: []
  automation: []
  other: []

process_areas: ["дробление", "измельчение", "классификация", "флотация", "реагентика", "вспомогательные"]
