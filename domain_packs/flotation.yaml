# количества из спецификации; насосы/зумпфы/конвейеры/бункеры агрегированы.
equipment:
  - {name: "МШЦ 4,5×6,0", type: "мельница шаровая с центральной разгрузкой", positions: ["4-2", "5-3", "5-5"], count: 3}
  - {name: "МШРГУ 4,5×6,0", type: "мельница шаровая с решёткой", positions: ["4-3", "5-1", "5-2", "5-4"], count: 4}
  - {name: "МШР 3,2×3,8", type: "мельница шаровая", positions: ["4-5", "4-11"], count: 2}
  - {name: "1КСП24", type: "классификатор спиральный", positions: ["4-3-CF (1КСП24М)", "5-4-CF"], count: 2}
  - {name: "2КСН24", type: "классификатор спиральный", positions: ["4-5.11-CF", "5-1.2-CF"], count: 2}
  - {name: "ГЦ-660", type: "гидроциклон (батарея, 1 раб/1 рез)", positions: ["4-2", "5-3", "5-5"], count: 3}
  - {name: "ФПМ-16-4К", type: "флотомашина", positions: ["2-1…2-16", "2-19", "2-20", "4-1", "4-2", "4-3", "4-5", "4-7", "4-8", "4-9", "4-10", "4-16", "4-19", "4-20"], count: 29}
  - {name: "ФМ-16УМ-4К", type: "флотомашина", positions: ["4-4", "4-6", "4-17", "4-18"], count: 4}
  - {name: "КРД 700/75", type: "дробилка крупного дробления", positions: ["№4 (корпус 1.2)"], count: 1}
  - {name: "КМД-2200Т", type: "дробилка мелкого дробления", positions: ["№1", "№2"], count: 2}
  - {name: "Sibra 2DR", type: "грохот двухситный 25×60", positions: ["№1", "№2"], count: 2}
  - {name: "П-30", type: "сгуститель радиальный", positions: ["4-СТ-01…06"], count: 6}
