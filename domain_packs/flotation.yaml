# меню направлений вмешательств по диагнозам — «пространство гипотез» экспертов.
# Промпт генерации просит рассмотреть каждое уместное направление (не выдумывая неуместных).
intervention_menu:
  R1:   # недоизмельчение: крупные классы + закрытый минерал
    - "геометрия/профиль футеровки мельниц"
    - "шаровая загрузка мельниц: диаметр, доля, класс износостойкости шаров"
    - "замена/уменьшение песковых насадок — гидроциклонов И/ИЛИ спиральных классификаторов (смотри, какие аппараты есть в регламенте фабрики)"
    - "замена спиральных классификаторов на гидроциклоны или донастройка (скорость вращения спиралей)"
    - "тонкое грохочение после 2-й стадии измельчения/классификации"
    - "контроль гранулометрии руды после конусных дробилок (мониторинг крупности питания мельниц с управлением режимом дробления)"
    - "авторегулирование разгрузочной щели конусных дробилок (автоматическое, не ручная настройка)"
    - "магнитная сепарация надцелевого класса с доизмельчением магнитной фракции"
    - "дополнительная/контрольная классификация целевого класса, классификация хвостов с возвратом в голову"
    - "додрабливание крупных фракций (галя, промпродукт) в ДРОБИЛКЕ — отдельный приём, не доизмельчение в мельнице"
  R2:   # переизмельчение/шламы: класс -10 + раскрытый минерал
    - "перераспределение фронта флотации: увеличение времени КОНТРОЛЬНОЙ операции (именно контрольной, не основной)"
    - "плотность пульпы во флотации: рассмотри И повышение (больше времени контакта частиц с пузырьками), И снижение (вязкие шламы) — что уместнее по этим данным; плюс аэрация"
    - "промежуточные контактные чаны ПЕРЕД КОНТРОЛЬНОЙ флотацией (не перед основной): время агитации с реагентами"
    - "реагентный режим для шламов (собиратель, диспергатор, пенообразователь)"
    - "автоматизация подачи воды в мельницы (стабилизация плотности помола)"
    - "ранний вывод готового класса из цикла измельчения (не перемалывать раскрытое)"
    - "контроль гранулометрии слива классификации (онлайн-гранулометр с обратной связью)"
  R3:   # недоработка флотации в среднем классе
    - "время/фронт флотации, число камер"
    - "реагентный режим (тип и расход собирателя, активаторы)"
    - "аэрация и уровень пены, плотность пульпы"
