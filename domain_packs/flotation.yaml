  - {name: "МШРГУ 4,5×6,0", type: "мельница шаровая с решёткой", positions: ["4-3", "5-1", "5-2", "5-4"]}
  - {name: "МШР 3,2×3,8", type: "мельница шаровая", positions: ["4-5", "4-11"]}
  - {name: "1КСП24", type: "классификатор спиральный", positions: []}
  - {name: "2КСН24", type: "классификатор спиральный", positions: []}
  - {name: "ГЦ-660", type: "гидроциклон", positions: ["4-2", "5-3", "5-5"]}
  - {name: "ФПМ-16-4К", type: "флотомашина", positions: [], count: 29}
